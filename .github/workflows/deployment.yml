name: Deploy Backend + Professional Documentation

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for git stats
        
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Deploy Lambda
      working-directory: backend/functions/api
      run: |
        npm ci --only=production || { echo "❌ npm install failed"; exit 1; }
        zip -r deploy.zip . -x "*.git*" "node_modules/.cache/*" "tests/*" || { echo "❌ zip creation failed"; exit 1; }
        
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: Update Lambda Function
      working-directory: backend/functions/api
      run: |
        aws lambda update-function-code \
          --function-name health-platform-dev \
          --zip-file fileb://deploy.zip \
          --publish || { echo "❌ Lambda deployment failed"; exit 1; }

  generate-professional-docs:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full git history for comprehensive analysis
        
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Generate Professional Documentation
      run: |
        # Make the documentation generator executable (back in root directory)
        chmod +x comprehensive-docs-generator.js || { echo "❌ chmod failed"; exit 1; }
        
        # Run the enhanced documentation generator
        node comprehensive-docs-generator.js || { echo "❌ documentation generation failed"; exit 1; }
        
        # Verify generated files
        ls -la docs-site/ || { echo "❌ docs-site directory not found"; exit 1; }
        
        # Display summary
        if [ -f "docs-site/platform-data.json" ]; then
          echo "✅ Professional documentation generated successfully"
          echo "📊 Generated files:"
          echo "   - index.html (Professional documentation site)"
          echo "   - platform-data.json (Structured data)"
          echo "   - README.md (Developer guide)"
        else
          echo "❌ Documentation generation failed"
          exit 1
        fi
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs-site
        cname: # Optional: Add your custom domain here

  summary:
    needs: [deploy-backend, generate-professional-docs]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Deployment Summary
      env:
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        BACKEND_RESULT: ${{ needs.deploy-backend.result }}
        DOCS_RESULT: ${{ needs.generate-professional-docs.result }}
      run: |
        echo "## 🎯 Deployment Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${BACKEND_RESULT}" == "success" ]; then
          echo "- ✅ **Backend:** Lambda deployed successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ **Backend:** Lambda deployment failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${DOCS_RESULT}" == "success" ]; then
          echo "- ✅ **Documentation:** Professional site generated and deployed" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ **Documentation:** Generation failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔗 Links:" >> $GITHUB_STEP_SUMMARY
        echo "- **🚀 Live Application:** https://main.d45x824boqj7y.amplifyapp.com/" >> $GITHUB_STEP_SUMMARY
        echo "- **🌐 API Gateway:** https://suhoxvn8ik.execute-api.us-east-1.amazonaws.com/dev/" >> $GITHUB_STEP_SUMMARY
        echo "- **📚 Professional Documentation:** https://${REPO_OWNER}.github.io/${REPO_NAME}/" >> $GITHUB_STEP_SUMMARY
        echo "- **📊 Platform Data:** https://${REPO_OWNER}.github.io/${REPO_NAME}/platform-data.json" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📈 Features:" >> $GITHUB_STEP_SUMMARY
        echo "- **Automated Discovery:** Project structure, APIs, database schema" >> $GITHUB_STEP_SUMMARY
        echo "- **Live API Testing:** Real-time endpoint status checking" >> $GITHUB_STEP_SUMMARY
        echo "- **Git Analytics:** Commit history, contributor stats" >> $GITHUB_STEP_SUMMARY
        echo "- **Developer Guide:** Complete setup instructions" >> $GITHUB_STEP_SUMMARY
        echo "- **Professional Design:** Investor-ready documentation" >> $GITHUB_STEP_SUMMARY